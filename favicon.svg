<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2e2e2e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Decorative thin line top -->
  <line x1="14" y1="14" x2="50" y2="14" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>

  <!-- T -->
  <text x="32" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="400"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-1">T</text>

  <!-- Decorative thin line bottom -->
  <line x1="14" y1="52" x2="50" y2="52" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
</svg>
